# ConfigMap — non-sensitive environment variables shared across pods.
# Sensitive values (MONGODB_URI, JWT_SECRET, passwords) go in secret.yaml, NOT here.
# Using a ConfigMap means you can change config without rebuilding images.
apiVersion: v1
kind: ConfigMap
metadata:
  name: watchtower-config
  namespace: watchtower
  labels:
    app.kubernetes.io/name: watchtower
data:
  # Server config
  PORT: "5000"
  NODE_ENV: "production"
  CLIENT_ORIGIN: "http://localhost:8080"
  WORKER_URL: "http://watchtower-worker:5001/notify"
  JWT_EXPIRES_IN: "7d"

  # Worker config
  WORKER_PORT: "5001"
  SMTP_HOST: "smtp.gmail.com"
  SMTP_PORT: "587"
  NOTIFICATION_EMAIL: "aj5298626@gmail.com"
