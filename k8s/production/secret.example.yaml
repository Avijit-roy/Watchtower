# secret.example.yaml — COMMITTED to git (no real values).
# Copy to k8s/production/secret.yaml and fill in real base64-encoded values.
# secret.yaml is gitignored — never commit it.
#
# How to base64-encode a value:
#   echo -n "my-actual-value" | base64 -w0
#
# How to decode/check:
#   echo "base64string==" | base64 -d
apiVersion: v1
kind: Secret
metadata:
  name: watchtower-secret
  namespace: watchtower
  labels:
    app.kubernetes.io/name: watchtower
    environment: production
type: Opaque
data:
  # Server secrets
  MONGODB_URI: <base64-encoded-mongodb-atlas-uri>
  JWT_SECRET: <base64-encoded-jwt-secret>

  # Worker secrets
  SMTP_USER: <base64-encoded-smtp-user>
  SMTP_PASS: <base64-encoded-smtp-password>
  SLACK_WEBHOOK_URL: <base64-encoded-slack-webhook-url>
