# ClusterIssuer — tells cert-manager to get TLS certificates from Let's Encrypt.
#
# Why ClusterIssuer not Issuer?
#   Issuer is namespace-scoped. ClusterIssuer works across namespaces.
#   Since the Ingress and the cert Secret must live in the same namespace as
#   the workloads, a ClusterIssuer is the cleanest approach for a single cluster.
#
# Two issuers: staging (for testing, won't burn Let's Encrypt rate limits) and
# production (issues real, browser-trusted certs). Always test with staging first.
#
# Apply this AFTER cert-manager is installed:
#   kubectl apply -f k8s/production/clusterissuer.yaml
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    # Staging ACME server — not browser-trusted, but safe to test with.
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: aj5298626@gmail.com   # Replace with your email for expiry notifications
    privateKeySecretRef:
      name: letsencrypt-staging-key
    solvers:
      - http01:
          ingress:
            class: nginx
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    # Production ACME server — issues real, browser-trusted certificates.
    # Rate limited: 50 certs per domain per week. Don't hit this repeatedly.
    server: https://acme-v02.api.letsencrypt.org/directory
    email: aj5298626@gmail.com   # Replace with your email for expiry notifications
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - http01:
          ingress:
            class: nginx
