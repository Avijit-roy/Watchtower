# Production Worker Service — ClusterIP (internal only)
apiVersion: v1
kind: Service
metadata:
  name: watchtower-worker
  namespace: watchtower
  labels:
    app.kubernetes.io/name: watchtower
    app.kubernetes.io/component: worker
spec:
  type: ClusterIP
  selector:
    app: watchtower-worker
  ports:
    - name: http
      port: 5001
      targetPort: 5001
      protocol: TCP
