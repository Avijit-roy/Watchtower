apiVersion: apps/v1
kind: Deployment
metadata:
  name: watchtower-client
  namespace: watchtower-staging
  labels:
    app.kubernetes.io/name: watchtower
    app.kubernetes.io/component: client
    environment: staging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: watchtower-client
  template:
    metadata:
      labels:
        app: watchtower-client
        app.kubernetes.io/component: client
    spec:
      imagePullSecrets:
        - name: ghcr-credentials
      containers:
        - name: client
          image: ghcr.io/avijit-roy/watchtower-client:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: "50m"
              memory: "32Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
