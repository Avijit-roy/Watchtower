apiVersion: apps/v1
kind: Deployment
metadata:
  name: watchtower-server
  namespace: watchtower-staging
  labels:
    app.kubernetes.io/name: watchtower
    app.kubernetes.io/component: server
    environment: staging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: watchtower-server
  template:
    metadata:
      labels:
        app: watchtower-server
        app.kubernetes.io/component: server
    spec:
      imagePullSecrets:
        - name: ghcr-credentials
      containers:
        - name: server
          image: ghcr.io/avijit-roy/watchtower-server:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
              name: http
          envFrom:
            - configMapRef:
                name: watchtower-config
          env:
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: watchtower-secret
                  key: MONGODB_URI
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: watchtower-secret
                  key: JWT_SECRET
          livenessProbe:
            httpGet:
              path: /healthz
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
