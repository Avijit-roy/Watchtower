# secret.example.yaml — Committed to git. Copy this to secret.yaml and fill real values.
# secret.yaml is gitignored. Never commit real credentials.
#
# How to encode a value:  echo -n "my-value" | base64 -w0
# How to decode a check:  echo "bXktdmFsdWU=" | base64 -d
apiVersion: v1
kind: Secret
metadata:
  name: watchtower-secret
  namespace: watchtower
  labels:
    app.kubernetes.io/name: watchtower
type: Opaque
data:
  # Server secrets
  MONGODB_URI: <base64-encoded-mongodb-atlas-uri>
  JWT_SECRET: <base64-encoded-jwt-secret>

  # Worker secrets
  SMTP_USER: <base64-encoded-smtp-user>
  SMTP_PASS: <base64-encoded-smtp-password>
  SLACK_WEBHOOK_URL: <base64-encoded-slack-webhook-url>
