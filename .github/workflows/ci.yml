name: CI Pipeline

on:
  pull_request:
    branches:
      - '**'

jobs:
  lint-and-test:
    name: Lint and Test Application
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Root Dependencies
        run: npm ci

      - name: Lint Client
        run: npm run lint:client

      - name: Lint Server
        run: npm run lint:server

      - name: Start MongoDB
        uses: supercharge/mongodb-github-action@1.11.0
        with:
          mongodb-version: '6.0'

      - name: Run Server Tests
        env:
          NODE_ENV: test
          MONGODB_URI: mongodb://localhost:27017/incident-command-test
          JWT_SECRET: supersecretjwtsigningkeyincidentcommandwatchtower123
        run: npm run test:server

  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Server Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: server/Dockerfile
          push: false
          tags: watchtower-server:latest

      - name: Build Worker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: worker/Dockerfile
          push: false
          tags: watchtower-worker:latest

      - name: Build Client Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: client/Dockerfile
          build-args: |
            VITE_API_URL=http://localhost:5000/api
            VITE_SOCKET_URL=http://localhost:5000
          push: false
          tags: watchtower-client:latest
