name: Publish Images to GHCR

# Triggers on merge to main — the images produced here are what Phase 7 (CD)
# will deploy to the k3s cluster. This is a Phase 6 step: confirm ghcr.io
# push works before wiring up the full auto-deploy.
on:
  push:
    branches:
      - main

# Needed to push packages to GitHub Container Registry
permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  # github.repository is "username/repo-name" — used to namespace images correctly
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  # ── Job 1: Run CI first — don't push broken images ──────────────────────────
  lint-and-test:
    name: Lint and Test (gate before push)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Lint Client
        run: npm run lint:client

      - name: Lint Server
        run: npm run lint:server

      - name: Start MongoDB
        uses: supercharge/mongodb-github-action@1.11.0
        with:
          mongodb-version: '6.0'

      - name: Run Server Tests
        env:
          NODE_ENV: test
          MONGODB_URI: mongodb://localhost:27017/incident-command-test
          JWT_SECRET: supersecretjwtsigningkeyincidentcommandwatchtower123
        run: npm run test:server

  # ── Job 2: Build and push all images to ghcr.io ─────────────────────────────
  publish-images:
    name: Build and Push Images to GHCR
    runs-on: ubuntu-latest
    needs: lint-and-test   # only runs if tests pass

    steps:
      - uses: actions/checkout@v4

      # Set up QEMU + Buildx for efficient multi-platform builds
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Log in to ghcr.io using the built-in GITHUB_TOKEN
      # No PAT needed for pushes from Actions — GITHUB_TOKEN has write:packages
      # via the permissions block above.
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Generate image tags: latest + the commit SHA for rollback capability
      - name: Extract Docker metadata
        id: meta-server
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/watchtower-server
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Extract Docker metadata (worker)
        id: meta-worker
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/watchtower-worker
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Extract Docker metadata (client)
        id: meta-client
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/watchtower-client
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      # Build and push server
      - name: Build and Push Server Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: server/Dockerfile
          push: true
          tags: ${{ steps.meta-server.outputs.tags }}
          labels: ${{ steps.meta-server.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build and push worker
      - name: Build and Push Worker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: worker/Dockerfile
          push: true
          tags: ${{ steps.meta-worker.outputs.tags }}
          labels: ${{ steps.meta-worker.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build and push client — VITE_API_URL and VITE_SOCKET_URL come from
      # GitHub Actions secrets so the production URL is never hardcoded in YAML.
      # Set these in: GitHub repo → Settings → Secrets and variables → Actions
      - name: Build and Push Client Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: client/Dockerfile
          push: true
          tags: ${{ steps.meta-client.outputs.tags }}
          labels: ${{ steps.meta-client.outputs.labels }}
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
            VITE_SOCKET_URL=${{ secrets.VITE_SOCKET_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "## Images pushed to GHCR ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Image | Tag |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| watchtower-server | latest + sha-${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| watchtower-worker | latest + sha-${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| watchtower-client | latest + sha-${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY

  # ── Job 3: Auto-deploy to Staging ───────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging Namespace
    runs-on: ubuntu-latest
    needs: publish-images

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Verify cluster connectivity
        run: kubectl cluster-info

      - name: Deploy to Staging
        run: |
          # Create staging namespace if not exists
          kubectl apply -f k8s/staging/namespace.yaml
          
          # Create pull secret in staging namespace so Kubernetes can pull images
          kubectl create secret docker-registry ghcr-credentials \
            --docker-server=ghcr.io \
            --docker-username=${{ github.actor }} \
            --docker-password=${{ secrets.GITHUB_TOKEN }} \
            --dry-run=client -o yaml | kubectl apply -n watchtower-staging -f -
            
          # Create watchtower secrets from GitHub Repository Secrets
          cat <<EOF > k8s/staging/secret.yaml
          apiVersion: v1
          kind: Secret
          metadata:
            name: watchtower-secret
            namespace: watchtower-staging
          type: Opaque
          data:
            MONGODB_URI: $(echo -n "${{ secrets.MONGODB_URI }}" | base64 -w0)
            JWT_SECRET: $(echo -n "${{ secrets.JWT_SECRET }}" | base64 -w0)
            SMTP_USER: $(echo -n "${{ secrets.SMTP_USER }}" | base64 -w0)
            SMTP_PASS: $(echo -n "${{ secrets.SMTP_PASS }}" | base64 -w0)
            SLACK_WEBHOOK_URL: $(echo -n "${{ secrets.SLACK_WEBHOOK_URL }}" | base64 -w0)
          EOF
          kubectl apply -f k8s/staging/secret.yaml
          
          # Apply ConfigMap and ClusterIssuers
          kubectl apply -f k8s/staging/configmap.yaml
          kubectl apply -f k8s/production/clusterissuer.yaml
          
          # Inject the specific build image tag (sha-<commit>) into deployment manifests
          sed -i "s|ghcr.io/avijit-roy/watchtower-server:latest|ghcr.io/avijit-roy/watchtower-server:sha-${{ github.sha }}|g" k8s/staging/server/deployment.yaml
          sed -i "s|ghcr.io/avijit-roy/watchtower-worker:latest|ghcr.io/avijit-roy/watchtower-worker:sha-${{ github.sha }}|g" k8s/staging/worker/deployment.yaml
          sed -i "s|ghcr.io/avijit-roy/watchtower-client:latest|ghcr.io/avijit-roy/watchtower-client:sha-${{ github.sha }}|g" k8s/staging/client/deployment.yaml
          
          # Apply Services and Deployments
          kubectl apply -f k8s/staging/server/service.yaml
          kubectl apply -f k8s/staging/server/deployment.yaml
          kubectl apply -f k8s/staging/worker/service.yaml
          kubectl apply -f k8s/staging/worker/deployment.yaml
          kubectl apply -f k8s/staging/client/service.yaml
          kubectl apply -f k8s/staging/client/deployment.yaml
          
          # Wait for rollout to complete to ensure zero-downtime transition
          kubectl rollout status deployment/watchtower-server -n watchtower-staging --timeout=120s
          kubectl rollout status deployment/watchtower-worker -n watchtower-staging --timeout=120s
          kubectl rollout status deployment/watchtower-client -n watchtower-staging --timeout=120s
          
          # Apply Ingress routing
          kubectl apply -f k8s/staging/ingress.yaml

  # ── Job 4: Deploy to Production (with manual approval gate) ─────────────────
  deploy-production:
    name: Deploy to Production Namespace
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment:
      name: production
      url: https://16.170.246.101.sslip.io

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Verify cluster connectivity
        run: kubectl cluster-info

      - name: Deploy to Production
        run: |
          # Create production namespace if not exists
          kubectl apply -f k8s/production/namespace.yaml
          
          # Create pull secret in production namespace
          kubectl create secret docker-registry ghcr-credentials \
            --docker-server=ghcr.io \
            --docker-username=${{ github.actor }} \
            --docker-password=${{ secrets.GITHUB_TOKEN }} \
            --dry-run=client -o yaml | kubectl apply -n watchtower -f -
            
          # Create watchtower secrets from GitHub Repository Secrets
          cat <<EOF > k8s/production/secret.yaml
          apiVersion: v1
          kind: Secret
          metadata:
            name: watchtower-secret
            namespace: watchtower
          type: Opaque
          data:
            MONGODB_URI: $(echo -n "${{ secrets.MONGODB_URI }}" | base64 -w0)
            JWT_SECRET: $(echo -n "${{ secrets.JWT_SECRET }}" | base64 -w0)
            SMTP_USER: $(echo -n "${{ secrets.SMTP_USER }}" | base64 -w0)
            SMTP_PASS: $(echo -n "${{ secrets.SMTP_PASS }}" | base64 -w0)
            SLACK_WEBHOOK_URL: $(echo -n "${{ secrets.SLACK_WEBHOOK_URL }}" | base64 -w0)
          EOF
          kubectl apply -f k8s/production/secret.yaml
          
          # Apply ConfigMap and ClusterIssuers
          kubectl apply -f k8s/production/configmap.yaml
          kubectl apply -f k8s/production/clusterissuer.yaml
          
          # Inject the specific build image tag (sha-<commit>) into deployment manifests
          sed -i "s|ghcr.io/avijit-roy/watchtower-server:latest|ghcr.io/avijit-roy/watchtower-server:sha-${{ github.sha }}|g" k8s/production/server/deployment.yaml
          sed -i "s|ghcr.io/avijit-roy/watchtower-worker:latest|ghcr.io/avijit-roy/watchtower-worker:sha-${{ github.sha }}|g" k8s/production/worker/deployment.yaml
          sed -i "s|ghcr.io/avijit-roy/watchtower-client:latest|ghcr.io/avijit-roy/watchtower-client:sha-${{ github.sha }}|g" k8s/production/client/deployment.yaml
          
          # Apply Services and Deployments
          kubectl apply -f k8s/production/server/service.yaml
          kubectl apply -f k8s/production/server/deployment.yaml
          kubectl apply -f k8s/production/worker/service.yaml
          kubectl apply -f k8s/production/worker/deployment.yaml
          kubectl apply -f k8s/production/client/service.yaml
          kubectl apply -f k8s/production/client/deployment.yaml
          
          # Wait for rollout
          kubectl rollout status deployment/watchtower-server -n watchtower --timeout=120s
          kubectl rollout status deployment/watchtower-worker -n watchtower --timeout=120s
          kubectl rollout status deployment/watchtower-client -n watchtower --timeout=120s
          
          # Apply Ingress routing
          kubectl apply -f k8s/production/ingress.yaml
